<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>banking System</title>
    <!-- daisy ui cdn link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- daisy ui cdn link end-->
    <!-- tailwind css start -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- tailwind css end -->
</head>

<body>
    <main class="flex justify-center text-center">
        <!-- phone mockup start -->
        <div class="mockup-phone  bg-base-300">
            <div class="mockup-phone-camera"></div>
            <div class="mockup-phone-display ">
                <!-- amount star -->
                <div class="stats top-17">
                    <div class="stat  ">
                        <div class="stat-title">Amount</div>
                        <div class="stat-value">89400</div>
                    </div>
                </div>
                <!-- amount end -->

                <!-- divider use to separate start -->
                <div class="divider mt-14"></div>

                <!-- add button add money and cashout -->
                <div class=" flex justify-center gap-8 mt-14">
                    <button id="addMoney" class="btn btn-neutral btn-outline">Add-Money</button>
                    <button id="cashOut" class="btn btn-neutral btn-dash">Cash-out</button>
                </div>
                <!-- add button add money and cashout end-->
                <div class="divider mt-14"></div>
                <!-- divider use to separate end -->

                <!-- input section start -->
                <div class="card  bg-base-100 shrink-0 shadow-2xl">
                    <div class="card-body ">
                        <fieldset class="fieldset">
                            <label class="label">Amount</label>
                            <input type="number" class="input" placeholder="Amount" />
                            <label class="label">Pin</label>
                            <input type="password" class="input" placeholder="Pin" />
                            
                            <button class="btn btn-neutral mt-4">Login</button>
                        </fieldset>
                    </div>
                </div>
                <!-- input section end -->
            </div>
        </div>
        <!-- phone Mockup end -->


    </main>
    <script src="./js/index.js"></script>

    <!-- short cuts keys-->
    <!-- .user-container>.user*5{user - $} -->
</body>

</html>
